name: FullBatteryAlert
options:
  bundleIdPrefix: com.spencerhill
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: VP38993WK6
    MARKETING_VERSION: "0.1.4"
    CURRENT_PROJECT_VERSION: "6"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Apple Distribution"
    PROVISIONING_PROFILE_SPECIFIER: "com.spencerhill.fullbatteryalert AppStore"
    ENABLE_HARDENED_RUNTIME: YES
targets:
  FullBatteryAlert:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/FullBatteryAlert
    info:
      path: Sources/FullBatteryAlert/Info.plist
      properties:
        CFBundleDisplayName: Battery Charged Notification
        CFBundleName: Battery Charged Notification
        LSUIElement: YES
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "MIT License"
        LSApplicationCategoryType: public.app-category.utilities
        CFBundleIconFile: AppIcon
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: Sources/FullBatteryAlert/FullBatteryAlert.entitlements
      properties:
        com.apple.security.app-sandbox: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spencerhill.fullbatteryalert
        PRODUCT_NAME: "Battery Charged Notification"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_KEY_LSUIElement: YES
